services:
  shiny-app:
    build:
      context: .
      args:
        GITHUB_PAT: ${GITHUB_PAT}
        SHINY_INSTANCES: ${SHINY_INSTANCES:-2}
    ports:
      - "3838:3838"
    environment:
      - SHINY_INSTANCES=${SHINY_INSTANCES:-2}
      - STATUS_REPORT_URL=${STATUS_REPORT_URL:-}
      - STATUS_REPORT_TOKEN=${STATUS_REPORT_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
