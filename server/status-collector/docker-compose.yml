services:
  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@rserve.dev}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped

  status-collector:
    build: .
    environment:
      - PORT=8787
      - INGEST_TOKEN=${INGEST_TOKEN:-}
      - DB_PATH=/data/status.db
    volumes:
      - ./data:/data
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.status-collector.rule=Host(`${DOMAIN:-status.localhost}`)"
      - "traefik.http.routers.status-collector.entrypoints=websecure"
      - "traefik.http.routers.status-collector.tls.certresolver=letsencrypt"
      - "traefik.http.services.status-collector.loadbalancer.server.port=8787"

volumes:
  letsencrypt:
